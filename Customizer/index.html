<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Config Customizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Top Bar ── -->
<header>
  <h1>⚙️ Form Config <span>Customizer</span></h1>
  <div class="header-actions">
    <label id="upload-area" style="cursor:pointer; display:flex; align-items:center; gap:0.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:0.4rem 0.9rem; font-size:0.82rem; font-weight:600; color:var(--text-muted);">
      📂 Load JSON
      <input type="file" id="upload-input" accept=".json" />
    </label>
    <button class="btn btn-ghost" onclick="refreshPreview()">🔄 Refresh Preview</button>
    <button class="btn btn-primary" onclick="downloadJSON()">⬇️ Download JSON</button>
  </div>
</header>

<!-- ── Editor Panel ── -->
<div id="editor-panel">

  <!-- Vertical Tab Nav -->
  <nav id="editor-nav">
    <button class="editor-nav-btn active" data-tab="general">
      <span class="nav-icon">📝</span>General
    </button>
    <button class="editor-nav-btn" data-tab="style">
      <span class="nav-icon">🎨</span>Style
    </button>
    <button class="editor-nav-btn" data-tab="pages">
      <span class="nav-icon">📄</span>Pages
    </button>
  </nav>

  <!-- Scrollable Content Pane -->
  <div id="editor-content">

    <!-- General Tab -->
    <div class="editor-tab active" id="etab-general">
      <p class="tab-heading">General</p>
      <div class="field">
        <label>Form Title</label>
        <input type="text" id="formTitle" placeholder="My Form" oninput="syncAll()" />
      </div>
      <div class="field">
        <label>Page Transition</label>
        <select id="transition" onchange="syncAll()">
          <option value="slide">↔ Slide (horizontal)</option>
          <option value="vertical">↕ Slide (vertical)</option>
          <option value="fade">✦ Fade</option>
          <option value="zoom">⊕ Zoom</option>
        </select>
      </div>
      <div class="field">
        <label>Transition Duration <small style="font-weight:400;color:var(--text-muted)">(e.g. 0.4s, 300ms)</small></label>
        <input type="text" id="transitionDuration" value="0.4s" placeholder="0.4s" oninput="syncAll()" />
      </div>
      <div class="field">
        <label>Transition Delay <small style="font-weight:400;color:var(--text-muted)">(pause between pages)</small></label>
        <input type="text" id="transitionDelay" value="0s" placeholder="0s" oninput="syncAll()" />
      </div>
    </div>

    <!-- Style Tab -->
    <div class="editor-tab" id="etab-style">
      <p class="tab-heading">Preset Theme</p>
      <div class="preset-grid" id="preset-grid"></div>

      <p class="tab-heading">Colors</p>
      <div class="style-grid">
        <div class="field"><label>Accent</label><div class="color-row"><input type="color" id="s-accentColor" oninput="colorPickerToText(this)" /><input type="text" id="s-accentColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Accent Hover</label><div class="color-row"><input type="color" id="s-accentHover" oninput="colorPickerToText(this)" /><input type="text" id="s-accentHover-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Background</label><div class="color-row"><input type="color" id="s-bgColor" oninput="colorPickerToText(this)" /><input type="text" id="s-bgColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Card Color</label><div class="color-row"><input type="color" id="s-cardColor" oninput="colorPickerToText(this)" /><input type="text" id="s-cardColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Heading</label><div class="color-row"><input type="color" id="s-headingColor" oninput="colorPickerToText(this)" /><input type="text" id="s-headingColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Label</label><div class="color-row"><input type="color" id="s-labelColor" oninput="colorPickerToText(this)" /><input type="text" id="s-labelColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input Border</label><div class="color-row"><input type="color" id="s-inputBorder" oninput="colorPickerToText(this)" /><input type="text" id="s-inputBorder-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input BG</label><div class="color-row"><input type="color" id="s-inputBg" oninput="colorPickerToText(this)" /><input type="text" id="s-inputBg-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input Text</label><div class="color-row"><input type="color" id="s-inputColor" oninput="colorPickerToText(this)" /><input type="text" id="s-inputColor-t" oninput="textToColorPicker(this)" /></div></div>
      </div>

      <p class="tab-heading">Layout & Typography</p>
      <div class="style-grid">
        <div class="field"><label>Card Radius</label><input type="text" id="s-cardRadius" placeholder="12px" oninput="syncAll()" /></div>
        <div class="field"><label>Anim Speed</label><input type="text" id="s-animationSpeed" placeholder="0.4s" oninput="syncAll()" /></div>
        <div class="field full"><label>Font Family</label><input type="text" id="s-fontFamily" placeholder="'Segoe UI', sans-serif" oninput="syncAll()" /></div>
        <div class="field full"><label>Card Shadow</label><input type="text" id="s-cardShadow" placeholder="0 4px 24px rgba(0,0,0,0.1)" oninput="syncAll()" /></div>
      </div>
    </div>

    <!-- Pages Tab -->
    <div class="editor-tab" id="etab-pages">
      <p class="tab-heading">Pages</p>
      <div id="pages-list"></div>
      <button class="add-btn" id="add-page-btn">＋ Add Page</button>
    </div>

  </div>

</div>

<!-- ── Preview Panel ── -->
<div id="preview-panel">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('preview', this)">👁 Live Preview</button>
    <button class="tab-btn" onclick="switchTab('json', this)">{ } JSON Output</button>
  </div>
  <div class="tab-content active" id="tab-preview">
    <iframe id="preview-frame" src="about:blank"></iframe>
  </div>
  <div class="tab-content" id="tab-json">
    <div id="json-output-wrap">
      <textarea id="json-output" spellcheck="false" readonly></textarea>
      <button class="btn btn-ghost btn-sm" id="copy-json-btn" onclick="copyJSON()">📋 Copy</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ── Scripts: load in dependency order ── -->
<script src="js/shared/AppConstants.js"></script>
<script src="js/ColorUtils.js"></script>
<script src="js/services/FormGenerator.js"></script>
<script src="js/models/ConfigModel.js"></script>
<script src="js/views/EditorView.js"></script>
<script src="js/views/PreviewView.js"></script>
<script src="js/controllers/AppController.js"></script>
<script src="js/app.js"></script>
</body>
</html>
