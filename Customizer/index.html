<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Config Customizer</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --red: #ef4444;
      --green: #22c55e;
      --radius: 10px;
      --font: 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: 56px calc(100vh - 56px);
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }
    .btn-danger { background: #3f1515; color: var(--red); border: 1px solid #7f2020; }
    .btn-danger:hover { background: #5a1d1d; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
    .btn-icon { padding: 0.3rem 0.55rem; font-size: 1rem; line-height: 1; }

    /* ── Left Panel (Editor) ── */
    #editor-panel {
      display: flex;
      flex-direction: row;
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ── Vertical Tab Nav ── */
    #editor-nav {
      flex-shrink: 0;
      width: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 0;
      gap: 0.25rem;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .editor-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      width: 56px;
      padding: 0.6rem 0.25rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .editor-nav-btn .nav-icon { font-size: 1.25rem; line-height: 1; pointer-events: none; }
    .editor-nav-btn:hover { background: var(--surface2); color: var(--text); }
    .editor-nav-btn.active {
      background: var(--surface2);
      color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    /* ── Tab Content Pane ── */
    #editor-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 0;
    }
    #editor-content::-webkit-scrollbar { width: 6px; }
    #editor-content::-webkit-scrollbar-track { background: transparent; }
    #editor-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .editor-tab { display: none; flex-direction: column; gap: 1rem; }
    .editor-tab.active { display: flex; }

    .tab-heading {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Right Panel (Tabs: Preview / JSON) ── */
    #preview-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: calc(100vh - 56px);
    }
    .tab-bar {
      display: flex;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; flex: 1; overflow: hidden; min-height: 0; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ── Form Preview iframe ── */
    #preview-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: #fff;
      display: block;
    }

    /* ── JSON Output ── */
    #json-output-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
    }
    #json-output {
      flex: 1;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82rem;
      padding: 1.25rem;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.6;
    }
    #copy-json-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
    }


    /* ── Form Controls ── */
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .field input[type=text],
    .field input[type=number],
    .field select,
    .field textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.45rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: var(--font);
      width: 100%;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 60px; }
    select option { background: #1a1d27; }

    /* ── Color Row ── */
    .color-row { display: flex; align-items: center; gap: 0.6rem; }
    .color-row input[type=color] {
      width: 36px;
      height: 32px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
    }
    .color-row input[type=text] { flex: 1; }

    /* ── Preset Buttons ── */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .preset-btn {
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      cursor: pointer;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      transition: border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .preset-btn:hover { transform: scale(1.03); }
    .preset-btn.active { border-color: var(--accent); }
    .preset-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
    }

    /* ── Style Grid ── */
    .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .style-grid .field.full { grid-column: 1 / -1; }

    /* ── Pages ── */
    .page-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .page-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      user-select: none;
    }
    .page-card-header:hover { background: rgba(255,255,255,0.03); }
    .page-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      flex-shrink: 0;
    }
    .page-card-title { flex: 1; font-size: 0.88rem; font-weight: 600; }
    .page-card-body { padding: 0.75rem; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 0.75rem; }
    .page-card.open .page-card-body { display: flex; }
    .page-card.open .page-chevron { transform: rotate(180deg); }
    .page-chevron { color: var(--text-muted); font-size: 0.7rem; transition: transform 0.2s; }

    /* ── Inputs Table ── */
    .inputs-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .input-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      display: grid;
      grid-template-columns: 1fr 100px 70px 40px 32px;
      gap: 0.5rem;
      align-items: center;
    }
    .input-row input, .input-row select {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
      outline: none;
      width: 100%;
      font-family: var(--font);
    }
    .input-row input:focus, .input-row select:focus { border-color: var(--accent); }
    .input-row select option { background: #1a1d27; }
    .input-row-labels {
      display: grid;
      grid-template-columns: 1fr 100px 70px 40px 32px;
      gap: 0.5rem;
      padding: 0 0.75rem;
    }
    .input-row-labels span { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .req-toggle {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .req-toggle.on { background: #14532d; border-color: var(--green); color: var(--green); }

    /* ── Add / Remove ── */
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.45rem;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .remove-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1.5px solid #3f1515;
      background: #1a0a0a;
      color: var(--red);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .remove-btn:hover { background: #3f1515; }

    /* ── Drag handle ── */
    .drag-handle {
      cursor: grab;
      color: var(--border);
      font-size: 1rem;
      padding: 0 0.25rem;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e2d1e;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Upload area ── */
    #upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s;
    }
    #upload-area:hover { border-color: var(--accent); color: var(--accent); }
    #upload-input { display: none; }
  </style>
</head>
<body>

<!-- ── Top Bar ── -->
<header>
  <h1>⚙️ Form Config <span>Customizer</span></h1>
  <div class="header-actions">
    <label id="upload-area" style="cursor:pointer; display:flex; align-items:center; gap:0.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:0.4rem 0.9rem; font-size:0.82rem; font-weight:600; color:var(--text-muted);">
      📂 Load JSON
      <input type="file" id="upload-input" accept=".json" />
    </label>
    <button class="btn btn-ghost" onclick="refreshPreview()">🔄 Refresh Preview</button>
    <button class="btn btn-primary" onclick="downloadJSON()">⬇️ Download JSON</button>
  </div>
</header>

<!-- ── Editor Panel ── -->
<div id="editor-panel">

  <!-- Vertical Tab Nav -->
  <nav id="editor-nav">
    <button class="editor-nav-btn active" data-tab="general">
      <span class="nav-icon">📝</span>General
    </button>
    <button class="editor-nav-btn" data-tab="style">
      <span class="nav-icon">🎨</span>Style
    </button>
    <button class="editor-nav-btn" data-tab="pages">
      <span class="nav-icon">📄</span>Pages
    </button>
  </nav>

  <!-- Scrollable Content Pane -->
  <div id="editor-content">

    <!-- General Tab -->
    <div class="editor-tab active" id="etab-general">
      <p class="tab-heading">General</p>
      <div class="field">
        <label>Form Title</label>
        <input type="text" id="formTitle" placeholder="My Form" oninput="syncAll()" />
      </div>
    </div>

    <!-- Style Tab -->
    <div class="editor-tab" id="etab-style">
      <p class="tab-heading">Preset Theme</p>
      <div class="preset-grid" id="preset-grid"></div>

      <p class="tab-heading">Colors</p>
      <div class="style-grid">
        <div class="field"><label>Accent</label><div class="color-row"><input type="color" id="s-accentColor" oninput="colorPickerToText(this)" /><input type="text" id="s-accentColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Accent Hover</label><div class="color-row"><input type="color" id="s-accentHover" oninput="colorPickerToText(this)" /><input type="text" id="s-accentHover-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Background</label><div class="color-row"><input type="color" id="s-bgColor" oninput="colorPickerToText(this)" /><input type="text" id="s-bgColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Card Color</label><div class="color-row"><input type="color" id="s-cardColor" oninput="colorPickerToText(this)" /><input type="text" id="s-cardColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Heading</label><div class="color-row"><input type="color" id="s-headingColor" oninput="colorPickerToText(this)" /><input type="text" id="s-headingColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Label</label><div class="color-row"><input type="color" id="s-labelColor" oninput="colorPickerToText(this)" /><input type="text" id="s-labelColor-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input Border</label><div class="color-row"><input type="color" id="s-inputBorder" oninput="colorPickerToText(this)" /><input type="text" id="s-inputBorder-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input BG</label><div class="color-row"><input type="color" id="s-inputBg" oninput="colorPickerToText(this)" /><input type="text" id="s-inputBg-t" oninput="textToColorPicker(this)" /></div></div>
        <div class="field"><label>Input Text</label><div class="color-row"><input type="color" id="s-inputColor" oninput="colorPickerToText(this)" /><input type="text" id="s-inputColor-t" oninput="textToColorPicker(this)" /></div></div>
      </div>

      <p class="tab-heading">Layout & Typography</p>
      <div class="style-grid">
        <div class="field"><label>Card Radius</label><input type="text" id="s-cardRadius" placeholder="12px" oninput="syncAll()" /></div>
        <div class="field"><label>Anim Speed</label><input type="text" id="s-animationSpeed" placeholder="0.4s" oninput="syncAll()" /></div>
        <div class="field full"><label>Font Family</label><input type="text" id="s-fontFamily" placeholder="'Segoe UI', sans-serif" oninput="syncAll()" /></div>
        <div class="field full"><label>Card Shadow</label><input type="text" id="s-cardShadow" placeholder="0 4px 24px rgba(0,0,0,0.1)" oninput="syncAll()" /></div>
      </div>
    </div>

    <!-- Pages Tab -->
    <div class="editor-tab" id="etab-pages">
      <p class="tab-heading">Pages</p>
      <div id="pages-list"></div>
      <button class="add-btn" onclick="addPage()">＋ Add Page</button>
    </div>

  </div>

</div>

<!-- ── Preview Panel ── -->
<div id="preview-panel">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('preview', this)">👁 Live Preview</button>
    <button class="tab-btn" onclick="switchTab('json', this)">{ } JSON Output</button>
  </div>
  <div class="tab-content active" id="tab-preview">
    <iframe id="preview-frame" src="about:blank"></iframe>
  </div>
  <div class="tab-content" id="tab-json">
    <div id="json-output-wrap">
      <textarea id="json-output" spellcheck="false" readonly></textarea>
      <button class="btn btn-ghost btn-sm" id="copy-json-btn" onclick="copyJSON()">📋 Copy</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Presets ────────────────────────────────────────────────────────────────────
const PRESETS = {
  default: { accentColor:'#4f46e5', accentHover:'#4338ca', bgColor:'#f0f4f8', cardColor:'#ffffff', cardRadius:'12px', cardShadow:'0 4px 24px rgba(0,0,0,0.10)', headingColor:'#1a1a2e', labelColor:'#374151', inputBorder:'#d1d5db', inputBg:'#ffffff', inputColor:'#111111', fontFamily:"'Segoe UI', sans-serif", animationSpeed:'0.4s' },
  dark:    { accentColor:'#7c6af7', accentHover:'#6457e8', bgColor:'#0f0f0f',  cardColor:'#1e1e2e', cardRadius:'12px', cardShadow:'0 4px 32px rgba(0,0,0,0.5)',    headingColor:'#e2e8f0', labelColor:'#94a3b8', inputBorder:'#334155', inputBg:'#0f172a', inputColor:'#e2e8f0', fontFamily:"'Segoe UI', sans-serif", animationSpeed:'0.4s' },
  ocean:   { accentColor:'#0891b2', accentHover:'#0e7490', bgColor:'#e0f2fe',  cardColor:'#f0f9ff', cardRadius:'16px', cardShadow:'0 6px 28px rgba(14,116,144,0.15)', headingColor:'#0c4a6e', labelColor:'#075985', inputBorder:'#7dd3fc', inputBg:'#ffffff', inputColor:'#0c4a6e', fontFamily:"'Segoe UI', sans-serif", animationSpeed:'0.4s' },
  rose:    { accentColor:'#e11d48', accentHover:'#be123c', bgColor:'#fff1f2',  cardColor:'#ffffff', cardRadius:'16px', cardShadow:'0 4px 24px rgba(225,29,72,0.10)', headingColor:'#881337', labelColor:'#9f1239', inputBorder:'#fda4af', inputBg:'#fff1f2', inputColor:'#881337', fontFamily:"'Georgia', serif",       animationSpeed:'0.35s' },
  forest:  { accentColor:'#16a34a', accentHover:'#15803d', bgColor:'#f0fdf4',  cardColor:'#ffffff', cardRadius:'10px', cardShadow:'0 4px 20px rgba(20,83,45,0.10)',   headingColor:'#14532d', labelColor:'#166534', inputBorder:'#86efac', inputBg:'#f0fdf4', inputColor:'#14532d', fontFamily:"'Segoe UI', sans-serif", animationSpeed:'0.4s' },
  custom:  { accentColor:'#4f46e5', accentHover:'#4338ca', bgColor:'#f0f4f8',  cardColor:'#ffffff', cardRadius:'12px', cardShadow:'0 4px 24px rgba(0,0,0,0.10)',     headingColor:'#1a1a2e', labelColor:'#374151', inputBorder:'#d1d5db', inputBg:'#ffffff', inputColor:'#111111', fontFamily:"'Segoe UI', sans-serif", animationSpeed:'0.4s' },
};
const PRESET_SWATCHES = {
  default: { bg:'#4f46e5', card:'#ffffff' },
  dark:    { bg:'#0f0f0f', card:'#1e1e2e' },
  ocean:   { bg:'#0891b2', card:'#f0f9ff' },
  rose:    { bg:'#e11d48', card:'#fff1f2' },
  forest:  { bg:'#16a34a', card:'#f0fdf4' },
  custom:  { bg:'#888',    card:'#ffffff' },
};

const INPUT_TYPES = ['text','number','email','password','url','tel','date','textarea'];

// ── State ─────────────────────────────────────────────────────────────────────
let config = {
  formTitle: 'My Book App Form',
  style: { preset: 'default', ...PRESETS.default },
  pages: [
    { pageTitle: 'Page 1', inputs: [{ name: 'Field 1', type: 'text', limit: 100, required: false }] }
  ]
};
let activePreset = 'default';

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Wire vertical nav tab buttons
  document.querySelectorAll('.editor-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchEditorTab(btn.dataset.tab));
  });

  buildPresetGrid();
  loadConfigIntoUI(config);

  document.getElementById('upload-input').addEventListener('change', onFileUpload);
});

function buildPresetGrid() {
  const grid = document.getElementById('preset-grid');
  grid.innerHTML = '';
  Object.keys(PRESETS).forEach(name => {
    const sw = PRESET_SWATCHES[name];
    const btn = document.createElement('div');
    btn.className = 'preset-btn' + (name === activePreset ? ' active' : '');
    btn.dataset.preset = name;
    btn.innerHTML = `
      <div class="preset-swatch" style="background: linear-gradient(135deg, ${sw.bg} 50%, ${sw.card} 50%)"></div>
      <span>${name}</span>`;
    btn.onclick = () => applyPreset(name);
    grid.appendChild(btn);
  });
}

// ── Preset Application ────────────────────────────────────────────────────────
function applyPreset(name) {
  activePreset = name;
  const vals = PRESETS[name];
  Object.assign(config.style, { preset: name, ...vals });
  loadStyleIntoUI(config.style);
  buildPresetGrid();
  syncAll();
}

// ── Load config into UI ───────────────────────────────────────────────────────
function loadConfigIntoUI(cfg) {
  document.getElementById('formTitle').value = cfg.formTitle || '';
  activePreset = cfg.style?.preset || 'default';
  loadStyleIntoUI(cfg.style || {});
  buildPresetGrid();
  renderPages();
  syncAll();
}

function loadStyleIntoUI(s) {
  const styleFields = ['accentColor','accentHover','bgColor','cardColor','headingColor','labelColor','inputBorder','inputBg','inputColor'];
  styleFields.forEach(k => {
    const val = s[k] || PRESETS[activePreset][k] || '#000000';
    const picker = document.getElementById('s-' + k);
    const text   = document.getElementById('s-' + k + '-t');
    if (picker) picker.value = normalizeHex(val);
    if (text)   text.value   = val;
  });
  const textFields = ['cardRadius','fontFamily','cardShadow','animationSpeed'];
  textFields.forEach(k => {
    const el = document.getElementById('s-' + k);
    if (el) el.value = s[k] || PRESETS[activePreset][k] || '';
  });
}

// ── Color Helpers ─────────────────────────────────────────────────────────────
function colorPickerToText(picker) {
  const id = picker.id;
  const textEl = document.getElementById(id + '-t');
  if (textEl) textEl.value = picker.value;
  syncAll();
}
function textToColorPicker(textEl) {
  const id = textEl.id.replace('-t', '');
  const picker = document.getElementById(id);
  const normalized = normalizeHex(textEl.value);
  if (picker && normalized) picker.value = normalized;
  syncAll();
}
function normalizeHex(val) {
  if (!val) return '#000000';
  const clean = val.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(clean)) return clean;
  if (/^#[0-9a-fA-F]{3}$/.test(clean)) {
    const [,r,g,b] = clean;
    return `#${r+r}${g+g}${b+b}`;
  }
  return '#000000';
}

// ── Read UI → config ──────────────────────────────────────────────────────────
function readStyleFromUI() {
  const s = { preset: activePreset };
  ['accentColor','accentHover','bgColor','cardColor','headingColor','labelColor','inputBorder','inputBg','inputColor'].forEach(k => {
    const el = document.getElementById('s-' + k + '-t');
    if (el && el.value) s[k] = el.value.trim();
  });
  ['cardRadius','fontFamily','cardShadow','animationSpeed'].forEach(k => {
    const el = document.getElementById('s-' + k);
    if (el && el.value) s[k] = el.value.trim();
  });
  return s;
}

function readConfigFromUI() {
  return {
    formTitle: document.getElementById('formTitle').value || 'My Form',
    style: readStyleFromUI(),
    pages: config.pages,
  };
}

// ── Pages Renderer ────────────────────────────────────────────────────────────
function renderPages() {
  const list = document.getElementById('pages-list');
  list.innerHTML = '';
  config.pages.forEach((page, pi) => {
    const card = document.createElement('div');
    card.className = 'page-card open';
    card.dataset.pi = pi;

    const inputsHTML = page.inputs.map((inp, ii) => buildInputRow(inp, pi, ii)).join('');

    card.innerHTML = `
      <div class="page-card-header" onclick="togglePage(${pi})">
        <span class="page-badge">P${pi + 1}</span>
        <span class="page-card-title">${page.pageTitle || 'Untitled Page'}</span>
        <button class="remove-btn" onclick="event.stopPropagation(); removePage(${pi})" title="Delete page">×</button>
        <span class="page-chevron">▼</span>
      </div>
      <div class="page-card-body">
        <div class="field">
          <label>Page Title</label>
          <input type="text" value="${escHtml(page.pageTitle)}" oninput="config.pages[${pi}].pageTitle = this.value; updatePageTitle(${pi}, this.value); syncAll()" />
        </div>
        <div>
          <div class="input-row-labels" style="margin-bottom:0.25rem;">
            <span>Name</span><span>Type</span><span>Limit</span><span>Req</span><span></span>
          </div>
          <div class="inputs-list" id="inputs-list-${pi}">${inputsHTML}</div>
          <button class="add-btn" style="margin-top:0.5rem;" onclick="addInput(${pi})">＋ Add Input</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function buildInputRow(inp, pi, ii) {
  const typeOpts = INPUT_TYPES.map(t => `<option value="${t}" ${inp.type === t ? 'selected' : ''}>${t}</option>`).join('');
  const reqOn = inp.required ? 'on' : '';
  return `
    <div class="input-row" id="input-${pi}-${ii}">
      <input type="text" value="${escHtml(inp.name || '')}" placeholder="Field name"
        oninput="config.pages[${pi}].inputs[${ii}].name = this.value; syncAll()" />
      <select onchange="config.pages[${pi}].inputs[${ii}].type = this.value; syncAll()">${typeOpts}</select>
      <input type="number" value="${inp.limit || 100}" min="1"
        oninput="config.pages[${pi}].inputs[${ii}].limit = parseInt(this.value)||1; syncAll()" />
      <button class="req-toggle ${reqOn}" title="Toggle required"
        onclick="toggleRequired(${pi}, ${ii}, this)">${inp.required ? '✓' : '–'}</button>
      <button class="remove-btn" onclick="removeInput(${pi}, ${ii})">×</button>
    </div>`;
}

function updatePageTitle(pi, val) {
  const card = document.querySelector(`[data-pi="${pi}"] .page-card-title`);
  if (card) card.textContent = val || 'Untitled Page';
}

function togglePage(pi) {
  const card = document.querySelectorAll('.page-card')[pi];
  if (card) card.classList.toggle('open');
}

function addPage() {
  config.pages.push({ pageTitle: `Page ${config.pages.length + 1}`, inputs: [{ name: 'Field 1', type: 'text', limit: 100, required: false }] });
  renderPages();
  syncAll();
}

function removePage(pi) {
  if (config.pages.length === 1) { showToast('⚠️ At least one page is required', true); return; }
  config.pages.splice(pi, 1);
  renderPages();
  syncAll();
}

function addInput(pi) {
  config.pages[pi].inputs.push({ name: '', type: 'text', limit: 100, required: false });
  renderPages();
  syncAll();
}

function removeInput(pi, ii) {
  if (config.pages[pi].inputs.length === 1) { showToast('⚠️ At least one input per page', true); return; }
  config.pages[pi].inputs.splice(ii, 1);
  renderPages();
  syncAll();
}

function toggleRequired(pi, ii, btn) {
  const curr = config.pages[pi].inputs[ii].required;
  config.pages[pi].inputs[ii].required = !curr;
  btn.classList.toggle('on', !curr);
  btn.textContent = !curr ? '✓' : '–';
  syncAll();
}

// ── Sync All ──────────────────────────────────────────────────────────────────
let syncTimer = null;
function syncAll() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    const cfg = readConfigFromUI();
    updateJSONOutput(cfg);
    refreshPreview(cfg);
  }, 120);
}

function updateJSONOutput(cfg) {
  cfg = cfg || readConfigFromUI();
  // Clean up _note fields before outputting
  const out = JSON.parse(JSON.stringify(cfg));
  document.getElementById('json-output').value = JSON.stringify(out, null, 2);
}

// ── Live Preview ──────────────────────────────────────────────────────────────
function refreshPreview(cfg) {
  cfg = cfg || readConfigFromUI();
  const html = generateFormHTML(cfg);
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── Editor Tab Switch ─────────────────────────────────────────────────────────
function switchEditorTab(name) {
  document.querySelectorAll('.editor-nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));

  const btn = document.querySelector(`.editor-nav-btn[data-tab="${name}"]`);
  const tab = document.getElementById('etab-' + name);
  if (btn) btn.classList.add('active');
  if (tab) tab.classList.add('active');

  document.getElementById('editor-content').scrollTop = 0;
}

// ── File Upload ───────────────────────────────────────────────────────────────
function onFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      config = parsed;
      loadConfigIntoUI(config);
      showToast('✅ Config loaded!');
    } catch {
      showToast('❌ Invalid JSON file', true);
    }
  };
  reader.readAsText(file);
}

// ── Download JSON ─────────────────────────────────────────────────────────────
function downloadJSON() {
  const cfg = readConfigFromUI();
  const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'form-config.json';
  a.click();
  showToast('✅ Downloaded form-config.json');
}

// ── Copy JSON ─────────────────────────────────────────────────────────────────
function copyJSON() {
  const txt = document.getElementById('json-output').value;
  navigator.clipboard.writeText(txt).then(() => showToast('✅ Copied to clipboard!'));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#2d1515' : '#1e2d1e';
  t.style.borderColor = isError ? '#ef4444' : '#22c55e';
  t.style.color = isError ? '#ef4444' : '#22c55e';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Form HTML Generator (mirrors src/formGenerator.ts logic) ──────────────────
function hexToRgb(hex) {
  const clean = (hex || '').replace('#','');
  const full = clean.length === 3 ? clean.split('').map(c=>c+c).join('') : clean;
  const n = parseInt(full, 16);
  if (isNaN(n)) return null;
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

function generateFormHTML(cfg) {
  const t = cfg.style || {};
  const focusRgb = hexToRgb(t.accentColor);
  const focusShadow = focusRgb ? `0 0 0 3px rgba(${focusRgb},0.18)` : '0 0 0 3px rgba(79,70,229,0.1)';
  const total = cfg.pages.length;

  const pagesHTML = cfg.pages.map((page, i) => {
    const isFirst = i === 0;
    const isLast  = i === total - 1;
    const inputs  = page.inputs.map(inp => {
      const id    = (inp.name||'field').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
      const ph    = inp.placeholder || inp.name;
      const req   = inp.required ? 'required' : '';
      const limit = inp.type === 'number' ? `max="${inp.limit}"` : `maxlength="${inp.limit}"`;
      const hint  = inp.type === 'number' ? `Max value: ${inp.limit}` : `Max ${inp.limit} characters`;
      if (inp.type === 'textarea') return `<div class="form-group"><label for="${id}">${inp.name}</label><textarea id="${id}" name="${id}" placeholder="${ph}" maxlength="${inp.limit}" ${req}></textarea><small class="limit-hint">Max ${inp.limit} chars</small></div>`;
      return `<div class="form-group"><label for="${id}">${inp.name}</label><input type="${inp.type}" id="${id}" name="${id}" placeholder="${ph}" ${limit} ${req} /><small class="limit-hint">${hint}</small></div>`;
    }).join('');
    return `<div class="form-page" id="page-${i}" ${isFirst?'':'style="display:none"'}>
      <h2>${page.pageTitle}</h2>
      <p class="page-counter">Page ${i+1} of ${total}</p>
      ${inputs}
      <div class="nav-buttons">
        ${!isFirst ? `<button type="button" class="btn-prev" onclick="navigate(${i},-1)">← Previous</button>` : ''}
        ${!isLast  ? `<button type="button" class="btn-next" onclick="navigate(${i}, 1)">Next →</button>`     : ''}
        ${isLast   ? `<button type="submit"  class="btn-submit">Submit ✓</button>`                            : ''}
      </div>
    </div>`;
  }).join('');

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:${t.fontFamily||"'Segoe UI',sans-serif"};background:${t.bgColor||'#f0f4f8'};display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem}
    .form-wrapper{background:${t.cardColor||'#fff'};border-radius:${t.cardRadius||'12px'};box-shadow:${t.cardShadow||'0 4px 24px rgba(0,0,0,.1)'};padding:2.5rem;width:100%;max-width:520px}
    h1{font-size:1.6rem;margin-bottom:1.5rem;color:${t.headingColor||'#1a1a2e'};text-align:center}
    h2{font-size:1.2rem;margin-bottom:.25rem;color:${t.headingColor||'#1a1a2e'}}
    .page-counter{font-size:.8rem;color:#888;margin-bottom:1.5rem}
    .progress-bar{width:100%;height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
    .progress-fill{height:100%;background:${t.accentColor||'#4f46e5'};border-radius:3px;transition:width .3s ease}
    .form-group{margin-bottom:1.25rem}
    label{display:block;font-size:.85rem;font-weight:600;color:${t.labelColor||'#374151'};margin-bottom:.35rem}
    input,textarea,select{width:100%;padding:.6rem .85rem;border:1.5px solid ${t.inputBorder||'#d1d5db'};border-radius:7px;font-size:.95rem;transition:border-color .2s;outline:none;color:${t.inputColor||'#111'};background:${t.inputBg||'#fff'}}
    input:focus,textarea:focus{border-color:${t.accentColor||'#4f46e5'};box-shadow:${focusShadow}}
    textarea{resize:vertical;min-height:90px}
    .limit-hint{font-size:.75rem;color:#9ca3af;margin-top:.25rem;display:block}
    .nav-buttons{display:flex;justify-content:space-between;margin-top:1.75rem;gap:.75rem}
    button{flex:1;padding:.65rem 1.25rem;border:none;border-radius:7px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
    button:active{transform:scale(.98)}
    .btn-next,.btn-submit{background:${t.accentColor||'#4f46e5'};color:#fff}
    .btn-next:hover,.btn-submit:hover{background:${t.accentHover||'#4338ca'}}
    .btn-prev{background:#e5e7eb;color:#374151}
    .btn-prev:hover{background:#d1d5db}
    .success-message{text-align:center;padding:2rem;display:none}
    .success-message h2{color:#16a34a;font-size:1.4rem}
    .success-message p{color:#555;margin-top:.5rem}
    .form-pages-track{overflow:hidden;position:relative}
    .form-page{animation-duration:${t.animationSpeed||'0.4s'};animation-fill-mode:both;animation-timing-function:cubic-bezier(.4,0,.2,1)}
    @keyframes slideInRight{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideOutLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-110%);opacity:0}}
    @keyframes slideInLeft{from{transform:translateX(-110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
    .slide-in-right{animation-name:slideInRight}
    .slide-out-left{animation-name:slideOutLeft;pointer-events:none;position:absolute;top:0;left:0;width:100%}
    .slide-in-left{animation-name:slideInLeft}
    .slide-out-right{animation-name:slideOutRight;pointer-events:none;position:absolute;top:0;left:0;width:100%}
  </style>
  </head><body>
  <div class="form-wrapper">
    <h1>${cfg.formTitle||'My Form'}</h1>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <form id="multi-step-form">
      <div class="form-pages-track">${pagesHTML}</div>
    </form>
    <div class="success-message"><h2>✅ Submitted!</h2><p>Thank you for completing the form.</p></div>
  </div>
  <script>
    const totalPages=${total};
    function updateProgress(i){document.querySelector('.progress-fill').style.width=((i+1)/totalPages*100)+'%'}
    function navigate(ci,dir){
      const cur=document.getElementById('page-'+ci);
      if(dir===1){const ins=cur.querySelectorAll('input[required],textarea[required]');for(const i of ins){if(!i.value.trim()){i.focus();i.style.borderColor='#ef4444';setTimeout(()=>i.style.borderColor='',1500);return;}}}
      const nxt=document.getElementById('page-'+(ci+dir));
      const oc=dir===1?'slide-out-left':'slide-out-right';
      const ic=dir===1?'slide-in-right':'slide-in-left';
      cur.classList.add(oc);nxt.style.display='block';nxt.classList.add(ic);
      cur.addEventListener('animationend',()=>{cur.style.display='none';cur.classList.remove(oc);},{once:true});
      nxt.addEventListener('animationend',()=>{nxt.classList.remove(ic);},{once:true});
      updateProgress(ci+dir);window.scrollTo({top:0,behavior:'smooth'});
    }
    document.getElementById('multi-step-form').addEventListener('submit',function(e){
      e.preventDefault();
      document.querySelector('.form-page:not([style*="none"])').style.display='none';
      document.querySelector('.progress-bar').style.display='none';
      document.querySelector('.success-message').style.display='block';
    });
    updateProgress(0);
  <\/script>
  </body></html>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Try to load the sibling form-config.json automatically
fetch('../Frontend/form-config.json')
  .then(r => r.json())
  .then(cfg => { config = cfg; loadConfigIntoUI(config); showToast('✅ Loaded form-config.json'); })
  .catch(() => { loadConfigIntoUI(config); });
</script>
</body>
</html>
